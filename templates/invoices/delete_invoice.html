{% extends 'base.html' %}

{% block title %}Excluir Fatura - {{ block.super }}{% endblock title %}

{% block body %}
<h1>Excluir Fatura</h1>

<p>Tem certeza que deseja excluir a fatura "{{ object }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
    <a href="{% url 'invoices:list' %}">Cancelar</a>
</form>
{% endblock body %}
