{% extends 'base.html' %}

{% block title %}Fatura - {{ block.super }}{% endblock title %}

{% block body %}
<h1>Fatura</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar</button>
    <a href="{% url 'invoices:list' %}">Cancelar</a>
</form>
{% endblock body %}
