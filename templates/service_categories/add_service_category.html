{% extends 'base.html' %}

{% block title %}Categoria de Serviço - {{ block.super }}{% endblock title %}

{% block body %}
<h1>Categoria de Serviço</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar</button>
    <a href="{% url 'service_categories:list_service_categories' %}">Cancelar</a>
</form>
{% endblock body %}
