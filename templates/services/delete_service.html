{% extends 'base.html' %}

{% block title %}
    {{ block.super }} | Excluir Serviço
{% endblock title %}

{% block body %}
<h1>Excluir Serviço</h1>

<p>Tem certeza que deseja excluir o serviço "{{ object }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
</form>
{% endblock body %}
