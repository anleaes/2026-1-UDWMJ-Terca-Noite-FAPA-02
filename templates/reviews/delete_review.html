{% extends 'base.html' %}

{% block title %}Excluir Avaliação - {{ block.super }}{% endblock title %}

{% block body %}
<h1>Excluir Avaliação</h1>

<p>Tem certeza que deseja excluir a avaliação "{{ object }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar exclusão</button>
    <a href="{% url 'reviews:list_reviews' %}">Cancelar</a>
</form>
{% endblock body %}
