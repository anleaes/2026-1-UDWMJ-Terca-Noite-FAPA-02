{% extends 'base.html' %}

{% block title %}Meu perfil - {{ block.super }}{% endblock title %}

{% block body %}

<p class="muted">Email: {{ user.email|default:'(não informado)' }}</p>
<a href="{% url 'accounts:logout' %}" class="btn btn--secondary">Sair</a>
{% endblock body %}
