{% extends 'base.html' %}

{% block title %}Login - {{ block.super }}{% endblock title %}

{% block body %}
<h1 class="page-title">Login</h1>
{% if erro %}<div class="alert alert--error">{{ erro }}</div>{% endif %}
<form method="post" class="form">
    {% csrf_token %}
    <p><label for="username">Usuário</label><input id="username" type="text" name="username" required></p>
    <p><label for="password">Senha</label><input id="password" type="password" name="password" required></p>
    <div class="form-actions">
        <button type="submit" class="btn btn--primary">Entrar</button>
    </div>
</form>
<p class="muted">Não tem conta? <a href="{% url 'accounts:register' %}">Cadastre-se</a></p>
{% endblock body %}
