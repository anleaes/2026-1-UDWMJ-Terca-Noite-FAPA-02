{% extends 'base.html' %}

{% block title %}Login - {{ block.super }}{% endblock title %}

{% block body %}
<h1>Login</h1>
{% if erro %}<p style="color:red">{{ erro }}</p>{% endif %}
<form method="post">
    {% csrf_token %}
    <p><label>Usuário <input type="text" name="username" required></label></p>
    <p><label>Senha <input type="password" name="password" required></label></p>
    <button type="submit">Entrar</button>
</form>
<p>Não tem conta? <a href="{% url 'accounts:register' %}">Registre-se</a></p>
{% endblock body %}
