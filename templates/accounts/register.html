{% extends 'base.html' %}

{% block title %}Registrar - {{ block.super }}{% endblock title %}

{% block body %}
<h1>Criar conta</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Registrar</button>
</form>
<p>Já tem conta? <a href="{% url 'accounts:login' %}">Entrar</a></p>
{% endblock body %}
